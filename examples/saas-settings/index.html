<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Batoi UIF SaaS Settings</title>
    <link rel="stylesheet" href="../../dist/uif.css">
  </head>
  <body>
    <main class="uif-app-shell">
      <aside class="uif-sidebar" data-uif="sidebar"><h1>Settings</h1><nav data-uif="nav">Profile Billing Security</nav></aside>
      <section class="uif-main">
        <div class="uif-toolbar"><h2>Workspace Settings</h2><span class="uif-badge">Pro</span></div>
        <form class="uif-card" data-uif="form" data-uif-validate="false">
          <label class="uif-field">Workspace <input class="uif-input" name="workspace" value="Acme"></label>
          <label class="uif-field">Seats <input class="uif-input" type="number" name="seats" value="12"></label>
          <button class="uif-btn">Save</button>
        </form>
      </section>
    </main>
  </body>
</html>
