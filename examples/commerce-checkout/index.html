<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Batoi UIF Checkout</title><link rel="stylesheet" href="../../dist/uif.css"></head>
  <body>
    <main class="uif-main">
      <h1>Checkout</h1>
      <section class="uif-card">
        <table class="uif-table" data-uif="table"><tbody><tr><td>Starter Plan</td><td>$29</td></tr><tr><td>Support</td><td>$9</td></tr></tbody></table>
      </section>
      <form class="uif-card" data-uif="form">
        <label class="uif-field">Email <input class="uif-input" name="email" data-uif-rule="required|email"></label>
        <button class="uif-btn">Pay $38</button>
      </form>
    </main>
  </body>
</html>
