<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAD Dashboard Example</title>
    <link rel="stylesheet" href="../../packages/css/index.css" />
  </head>
  <body>
    <main class="uif-container uif-stack uif-p-4">
      <h1>Dashboard</h1>
      <section class="uif-grid">
        <article id="sales-card" class="uif-card">
          <h2>Sales</h2>
          <p>$24,800</p>
          <button data-uif="ajax" data-uif-action="reload" data-uif-src="/dashboard/sales" data-uif-target="#sales-card">Refresh</button>
        </article>
        <article id="tickets-card" class="uif-card">
          <h2>Tickets</h2>
          <p>18 open</p>
          <button data-uif="ajax" data-uif-action="reload" data-uif-src="/dashboard/tickets" data-uif-target="#tickets-card">Refresh</button>
        </article>
      </section>

      <section class="uif-card">
        <h2>Revenue Chart</h2>
        <div
          data-uif="chart"
          data-uif-chart="grouped-bar"
          data-uif-refresh="interval"
          data-uif-interval="30000"
          data-uif-options='{"legend":true,"grid":true}'
          data-uif-data='[{"label":"Jan","values":{"New":120,"Renewal":80}},{"label":"Feb","values":{"New":180,"Renewal":92}},{"label":"Mar","values":{"New":150,"Renewal":110}}]'>
        </div>
      </section>

      <section class="uif-grid-3">
        <article class="uif-card">
          <h2>Pipeline Mix</h2>
          <div data-uif="chart" data-uif-chart="donut" data-uif-options='{"legend":true}' data-uif-data='[{"label":"Won","value":45},{"label":"Open","value":35},{"label":"Risk","value":20}]'></div>
        </article>
        <article class="uif-card">
          <h2>Readiness</h2>
          <div data-uif="chart" data-uif-chart="radar" data-uif-data='[{"label":"Security","value":82},{"label":"Performance","value":74},{"label":"Reliability","value":91},{"label":"Cost","value":68}]'></div>
        </article>
        <article class="uif-card">
          <h2>Target</h2>
          <div data-uif="chart" data-uif-chart="bullet" data-uif-data='[{"label":"Revenue","value":72,"target":85,"max":100}]'></div>
        </article>
      </section>

      <section class="uif-card">
        <h2>Activity Feed</h2>
        <div data-uif="realtime" data-uif-channel="dashboard" data-uif-mode="poll" data-uif-src="/mock/activity" data-uif-target="#dashboard-feed"></div>
        <div id="dashboard-feed" aria-live="polite">Waiting for updates...</div>
      </section>

      <section class="uif-card" data-uif="tabs">
        <button data-uif-role="tab">Revenue</button>
        <button data-uif-role="tab">Operations</button>
        <div data-uif-role="tabpanel">Revenue widget partial.</div>
        <div data-uif-role="tabpanel">Operations widget partial.</div>
      </section>

      <button class="uif-btn" data-uif-action="toast" data-uif-message="Dashboard refreshed" data-uif-type="success">Toast notification</button>
    </main>
  </body>
</html>
