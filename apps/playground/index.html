<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>UIF Playground</title><link rel='stylesheet' href='../../packages/css/index.css'></head><body><main class='uif-container uif-stack uif-p-4'><h1>Playground</h1><section><h2>Modal</h2><div data-uif='modal' data-uif-state='closed' class='uif-card'>Modal panel</div></section><section><h2>Tabs</h2><div data-uif='tabs'><button data-uif-role='tab'>One</button><button data-uif-role='tab'>Two</button><div data-uif-role='tabpanel'>One content</div><div data-uif-role='tabpanel'>Two content</div></div></section><section><h2>Dropdown</h2><div data-uif='dropdown'><button data-uif-role='trigger'>Menu</button><div data-uif-role='panel' hidden><button data-uif-role='item'>Item</button></div></div></section><section><h2>Toast</h2><button data-uif-action='toast'>Show toast</button></section><section><h2>AJAX Mock</h2><button data-uif='ajax' data-uif-src='/mock/partial' data-uif-target='#result'>Load</button><div id='result' class='uif-card'></div></section><section><h2>Form</h2><form data-uif='form'><input name='name' data-uif-rule='required|minLength:2'><button>Validate</button></form></section></main></body></html>
