<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Batoi UIF Playground</title>
    <link rel="stylesheet" href="../../packages/css/index.css" />
  </head>
  <body>
    <main class="uif-container uif-stack uif-p-4">
      <h1>UIF Playground</h1>

      <section class="uif-card">
        <h2>Modal</h2>
        <button class="uif-btn" data-uif-action="open" data-uif-target="#demo-modal">Open modal</button>
        <div id="demo-modal" data-uif="modal" data-uif-state="closed" hidden>
          <div data-uif-role="dialog" class="uif-card">
            <p>Modal content with Escape and focus trapping.</p>
            <button data-uif-action="close">Close</button>
          </div>
        </div>
      </section>

      <section class="uif-card">
        <h2>Tabs</h2>
        <div data-uif="tabs">
          <button data-uif-role="tab">One</button>
          <button data-uif-role="tab">Two</button>
          <div data-uif-role="tabpanel">One content</div>
          <div data-uif-role="tabpanel">Two content</div>
        </div>
      </section>

      <section class="uif-card">
        <h2>Dropdown</h2>
        <div data-uif="dropdown">
          <button data-uif-role="trigger">Menu</button>
          <div data-uif-role="panel">
            <button data-uif-role="item">Item</button>
          </div>
        </div>
      </section>

      <section class="uif-card">
        <h2>Toast</h2>
        <button class="uif-btn" data-uif-action="toast" data-uif-message="Saved!" data-uif-type="success">Show toast</button>
      </section>

      <section class="uif-card">
        <h2>AJAX Partial Mock</h2>
        <button data-uif="ajax" data-uif-src="/mock/partial" data-uif-target="#partial-result">Load mock partial</button>
        <div id="partial-result"></div>
      </section>

      <section class="uif-card">
        <h2>Form Validation</h2>
        <form data-uif="form" data-uif-validate="true">
          <label>Name <input name="name" data-uif-rule="required|minLength:2" /></label>
          <button class="uif-btn">Validate</button>
        </form>
      </section>
    </main>
  </body>
</html>
